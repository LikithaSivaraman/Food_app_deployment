<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Food App</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <h1>🍔 Food App</h1>
  <p>Experience fast & easy online ordering..Grab your order here !!!</p>
</header>

<section class="server-info">
 <p>Better food for more people..</p>
  <p>For over a decade, we’ve enabled our customers to discover new tastes, delivered right to their doorstep <span id="time"></span></p>
</section>

<section class="food-container">
  <div class="card">
    <img src="https://github.com/LikithaSivaraman/Food_app_deployment/tree/main/images/Pizza.jpg">
    <h3>Pizza</h3>
    <p>$12</p>
    <button>Order</button>
  </div>

  <div class="card">
    <img src="https://github.com/LikithaSivaraman/Food_app_deployment/tree/main/images/Burger.jpg">
    <h3>Burger</h3>
    <p>$8</p>
    <button>Order</button>
  </div>

  <div class="card">
    <img src="https://github.com/LikithaSivaraman/Food_app_deployment/tree/main/images/Pasta.png">
    <h3>Pasta</h3>
    <p>$10</p>
    <button>Order</button>
  </div>

  <div class="card">
    <img src="https://github.com/LikithaSivaraman/Food_app_deployment/tree/main/imagesfries.jpg">
    <h3>Fries</h3>
    <p>$5</p>
    <button>Order</button>
  </div>
</section>

<script src="script.js"></script>
</body>
</html>
